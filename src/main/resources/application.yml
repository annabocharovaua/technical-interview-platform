server:
  port: 8085

spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://interview-db.c8byecu6qbwl.us-east-1.rds.amazonaws.com:3306/voice_assistant?createDatabaseIfNotExist=true&useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=CONVERT_TO_NULL&jdbcCompliantTruncation=false
    username: ${MYSQL_USERNAME:admin}
    password: ${MYSQL_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  websocket:
    allowed-origins: "*"

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o-realtime-preview
  voice-model: whisper-1
  tts-model: tts-1
  tts-voice: alloy

jdoodle:
  client-id: ${JDOODLE_CLIENT_ID}
  client-secret: ${JDOODLE_CLIENT_SECRET}
  benchmark-enabled: false

aws:
  ses:
    sender-email: ${AWS_SES_SENDER_EMAIL}
    region: ${AWS_REGION}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

logging:
  level:
    root: INFO
    com.voiceassistant: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
